<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Akun - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-box { 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 20px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
        }

        input, select, button { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
        }

        button { 
            background-color: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
        }

        button:hover { 
            background-color: #0056b3; 
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>Daftar Akun</h1>
        <form id="registerForm">
            <input type="text" id="regUsername" placeholder="Username Baru" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <select id="regRole">
                <option value="user">User (Siswa)</option>
                <option value="admin">Admin (Petugas)</option>
            </select>
            <button type="submit">Daftar Sekarang</button>
        </form>
        <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
        <p id="regMessage"></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();
                if (data.success) {
                    alert('Registrasi Berhasil! Silakan Login.');
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('regMessage').textContent = data.message;
                    document.getElementById('regMessage').style.color = "red";
                }
            } catch (err) {
                console.error(err);
                alert('Gagal menghubungi server');
            }
        });
    </script>
</body>
</html>
