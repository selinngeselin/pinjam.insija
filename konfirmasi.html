<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berhasil Diajukan - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <section class="confirm-section">
            <div class="confirm-card">
                <div class="success-icon">✔️</div>
                <h2>Pengajuan Berhasil!</h2>
                <p>Permintaan peminjaman Anda telah tercatat ke dalam sistem <strong>SIJA</strong>. Silakan tunggu konfirmasi dari petugas di lab.</p>
                
                <div class="confirm-details">
                    <p><strong>Status:</strong> Menunggu Persetujuan</p>
                    <p><strong>Kode Booking:</strong> #SIJA-2026-001</p>
                </div>

                <div class="confirm-buttons">
                    <a href="Dashboard.html" class="btn-primary">Kembali ke Home</a>
                    <a href="daftar-barang.html" class="btn-secondary">Pinjam Lagi</a>
                </div>
            </div>
        </section>
    </div>
</body>
<script>
    
    // Contoh fungsi pada halaman konfirmasi user
    async function ajukanPeminjaman() {
        const dataPinjam = {
            borrowerName: localStorage.getItem('username'), // Mengambil nama user yang sedang login
            itemName: "Laptop", // Contoh nama barang
            quantity: 1,
            date: new Date()
        };

        try {
            const response = await fetch('http://localhost:3000/api/loans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPinjam)
            });

            const result = await response.json();
            if (result.success) {
                alert("Pengajuan berhasil dikirim! Menunggu konfirmasi admin.");
                window.location.href = 'Dashboard.html';
            }
        } catch (error) {
            console.error("Gagal mengirim pengajuan:", error);
        }
    }
</script>
</html>
