<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinjam.inSIJA - Edit Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1e90ff 0%, #4ab3ff 60%, #74c7ff 100%);
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: white;
    min-height: 100vh;
    flex-shrink: 0;
    padding: 24px 0;
    box-shadow: 2px 0 16px rgba(0,0,0,0.08);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px 32px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #1e90ff, #4ab3ff);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 22px;
    font-weight: 800;
  }

  .logo-text .brand { font-size: 18px; font-weight: 800; color: #1e90ff; }
  .logo-text .tagline { font-size: 11px; color: #888; line-height: 1.3; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    color: #555;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    border-radius: 0 24px 24px 0;
    margin-right: 16px;
    text-decoration: none;
  }

  .nav-item:hover, .nav-item.active {
    background: #f0f8ff;
    color: #1e90ff;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    justify-content: flex-end;
    padding: 16px 32px;
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    padding: 8px 16px 8px 8px;
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .avatar {
    width: 34px;
    height: 34px;
    background: white;
    color: #1e90ff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
  }

  .card-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 0 32px 40px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 48px;
    width: 100%;
    max-width: 820px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }

  .card-title {
    font-size: 20px;
    font-weight: 800;
    color: #1e90ff;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-group { margin-bottom: 22px; }

  .form-label {
    display: block;
    font-weight: 700;
    font-size: 14px;
    color: #333;
    margin-bottom: 10px;
  }

  .form-input {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: #222;
    background: white;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus {
    border-color: #1e90ff;
    box-shadow: 0 0 0 3px rgba(30,144,255,0.15);
  }

  .form-input::placeholder { color: #bbb; }

  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }

  .btn-simpan {
    background: linear-gradient(135deg, #1e90ff, #4ab3ff);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(30,144,255,0.35);
  }

  .btn-simpan:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(30,144,255,0.45);
  }

  .btn-batal {
    background: #f0f0f0;
    color: #555;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .btn-batal:hover { background: #e0e0e0; }

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: #22c55e;
    color: white;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 4px 20px rgba(34,197,94,0.4);
    display: none;
    align-items: center;
    gap: 8px;
    animation: slideUp 0.3s ease;
    z-index: 999;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">Σ</div>
    <div class="logo-text">
      <div class="brand">Pinjam.in<strong>SIJA</strong></div>
      <div class="tagline">Solusi Peminjaman Mudah &<br>Cepat</div>
    </div>
  </div>
  <a href="profil-user.html" class="nav-item">🏠 Dashboard</a>
  <a href="profil-user.html" class="nav-item">👤 Riwayat</a>
</div>

<div class="main">
  <div class="topbar">
    <div class="user-badge">
      <div class="avatar" id="topAvatar">?</div>
      <span id="topName">Pengguna</span>
      <span style="font-size:11px;opacity:.8;">▼</span>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card">
      <div class="card-title">✏️ Edit Profil</div>

      <div class="form-group">
        <label class="form-label">Nama :</label>
        <input type="text" class="form-input" id="nama" placeholder="Masukkan nama lengkap">
      </div>

      <div class="form-group">
        <label class="form-label">NIS :</label>
        <input type="text" class="form-input" id="nis" placeholder="Masukkan NIS">
      </div>

      <div class="form-group">
        <label class="form-label">Nomor Telepon :</label>
        <input type="text" class="form-input" id="telepon" placeholder="Masukkan nomor telepon">
      </div>

      <div class="form-group">
        <label class="form-label">Akun Google :</label>
        <input type="email" class="form-input" id="google" placeholder="Masukkan email Google">
      </div>

      <div class="form-group">
        <label class="form-label">Angkatan, Rombel Kelas :</label>
        <input type="text" class="form-input" id="angkatan" placeholder="Contoh: 50, SIJA A">
      </div>

      <div class="btn-group">
        <button class="btn-simpan" onclick="simpanData()">Simpan</button>
        <a href="user.html" class="btn-batal">Batal</a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ Data berhasil disimpan!</div>

<script>
  // Load existing data if any
  const fields = ['nama', 'nis', 'telepon', 'google', 'angkatan'];
  const stored = JSON.parse(localStorage.getItem('profilUser') || '{}');

  fields.forEach(f => {
    if (stored[f]) document.getElementById(f).value = stored[f];
  });

  // Update topbar name
  function updateTopbar() {
    const data = JSON.parse(localStorage.getItem('profilUser') || '{}');
    const name = data.nama || 'Pengguna';
    document.getElementById('topName').textContent = name;
    const initials = name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('topAvatar').textContent = initials || '?';
  }
  updateTopbar();

  function simpanData() {
    const data = {};
    fields.forEach(f => data[f] = document.getElementById(f).value.trim());

    if (!data.nama) {
      alert('Nama tidak boleh kosong!');
      return;
    }

    localStorage.setItem('profilUser', JSON.stringify(data));

    const toast = document.getElementById('toast');
    toast.style.display = 'flex';
    setTimeout(() => {
      toast.style.display = 'none';
      window.location.href = 'profil-user.html';
    }, 1500);
  }
</script>
</body>
</html>
