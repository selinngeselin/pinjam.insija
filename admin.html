<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="nav-left"><a href="#" class="logo">Pinjam.in Admin</a></div>
        <div class="nav-right">
            <span class="admin-name">Halo, Petugas Lab</span>
            <a href="login.html" class="btn-logout">Keluar</a>
        </div>
    </nav>

    <div class="wrapper">
        <section class="dashboard-section">
            <div class="dashboard-header">
                <h2>Daftar Pengajuan Peminjaman</h2>
                <p>Kelola permintaan alat praktikum siswa di sini.</p>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Peminjam</th>
                            <th>Barang</th>
                            <th>Jumlah</th>
                            <th>Tanggal</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="loanTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const role = localStorage.getItem('role');
    if (role !== 'admin') {
        alert("Akses Ditolak! Anda bukan Admin.");
        window.location.href = 'login.html'; // Tendang balik ke login jika bukan admin
    }
        // Fungsi mengambil data dari endpoint /api/loans di server.js
        async function loadLoans() {
            try {
                const response = await fetch('http://localhost:3000/api/loans');
                const loans = await response.json();
                const tableBody = document.getElementById('loanTableBody');
                tableBody.innerHTML = ''; 

                loans.forEach(loan => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${loan.borrowerName}</td>
                            <td>${loan.itemName}</td>
                            <td>${loan.quantity} unit</td>
                            <td>${new Date(loan.date).toLocaleDateString('id-ID')}</td>
                            <td>
                                <button onclick="confirmReturn('${loan._id}', '${loan.itemName}', ${loan.quantity})" class="btn-submit" style="padding: 5px 10px; font-size: 12px;">
                                    Selesai
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Gagal memuat data peminjaman:", err);
            }
        }

        async function confirmReturn(id, itemName, quantity) {
            if(confirm(`Konfirmasi pengembalian ${itemName}?`)) {
                const res = await fetch(`http://localhost:3000/api/return-item/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ itemName, quantity })
                });
                const result = await res.json();
                if(result.success) {
                    alert(result.message);
                    loadLoans(); // Refresh tabel otomatis
                }
            }
        }

        loadLoans(); // Jalankan saat halaman dibuka
    </script>
</body>
</html>
