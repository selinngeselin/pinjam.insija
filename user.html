<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-card p {
            font-size: 16px;
            margin: 10px 0;
        }
        .btn-prymary {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left"><a href="index.html" class="logo">Pinjam.in</a></div>
        <div class="nav-right">
            <a href="index.html" class="btn-primary">Ke Dashboard</a>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <section class="profile-card">
            <h2>Informasi Akun</h2>
            <div id="profile-info">
                <p>Memuat data...</p>
            </div>
        </section>
    </div>

    <script>
        async function fetchProfile() {
            const username = localStorage.getItem('username');
            if (!username) { window.location.href = 'login.html'; return; }

            try {
                const response = await fetch(`http://localhost:3000/api/me/${encodeURIComponent(username)}`);
                const data = await response.json();
                
                document.getElementById('profile-info').innerHTML = `
                    <p><strong>Username:</strong> ${data.username}</p>
                    <p><strong>Email:</strong> ${data.email}</p>
                    <p><strong>NIS:</strong> ${data.nis || '-'}</p>
                    <p><strong>Role:</strong> ${data.role}</p>
                `;
            } catch (err) { console.error(err); }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        fetchProfile();
    </script>
</body>
</html>
