<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-card p {
            font-size: 16px;
            margin: 10px 0;
        }
        .btn-prymary {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left"><a href="Dashboard.html" class="logo">Pinjam.in</a></div>
        <div class="nav-right">
            <a href="Dashboard.html" class="btn-primary">Ke Dashboard</a>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <section class="profile-card">
            <h2>Informasi Akun</h2>
            <div id="profile-info">
                <p>Memuat data...</p>
            </div>
        </section>
        <section class="history-container">
            <h3>Riwayat Peminjaman Saya</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Nama Barang</th>
                        <th>Jumlah</th>
                        <th>Tanggal Pinjam</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="userHistoryBody">
                    </tbody>
            </table>
        </section>
    </div>

    <script>
        async function fetchProfile() {
            const username = localStorage.getItem('username');
            if (!username) { window.location.href = 'login.html'; return; }

            try {
                const response = await fetch(`http://localhost:3000/api/me/${encodeURIComponent(username)}`);
                const data = await response.json();
                
                document.getElementById('profile-info').innerHTML = `
                    <p><strong>Username:</strong> ${data.username}</p>
                    <p><strong>Email:</strong> ${data.email}</p>
                    <p><strong>NIS:</strong> ${data.nis || '-'}</p>
                    <p><strong>Role:</strong> ${data.role}</p>
                `;
            } catch (err) { console.error(err); }
        }

        async function loadUserHistory() {
            const username = localStorage.getItem('username');
            try {
                const response = await fetch(`http://localhost:3000/api/loans?username=${encodeURIComponent(username)}`);
                const loans = await response.json();
                
                const historyBody = document.getElementById('userHistoryBody');
                historyBody.innerHTML = '';

                if (loans.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="4">Belum ada riwayat peminjaman.</td></tr>';
                    return;
                }

                // Di dalam fungsi loadUserHistory() pada user.html
                loans.forEach(loan => {
                    // Tentukan warna badge berdasarkan status
                    const statusClass = loan.status === "Dipinjam" ? "badge-warning" : "badge-success";
                    
                    historyBody.innerHTML += `
                        <tr>
                            <td>${loan.itemName}</td>
                            <td>${loan.quantity} unit</td>
                            <td>${new Date(loan.date).toLocaleDateString('id-ID')}</td>
                            <td><span class="status-badge ${statusClass}">${loan.status}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Gagal memuat riwayat:", err);
            }
        }

        // Panggil fungsi ini saat halaman dimuat
        loadUserHistory();

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        fetchProfile();
    </script>
</body>
</html>
