<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinjam.in - Modern Peminjaman</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Grouping Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-auth {
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-login {
            background: var(--primary);
            color: white;
        }

        .btn-login:hover {
            background: var(--primary-hover);
        }

        .btn-register {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-register:hover {
            background: #e7f1ff;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
        }

        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #searchInput {
            padding: 12px 25px;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .item {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .item-info {
            padding: 15px;
        }

        .item-name {
            font-weight: bold;
            font-size: 1.1em;
            margin: 0 0 10px 0;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 10px;
        }

        .available { background: #d4edda; color: #155724; }
        .unavailable { background: #f8d7da; color: #721c24; }

        #welcome-text {
            font-weight: bold;
            margin-right: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pinjam<span style="color: var(--primary);">.in</span></h1>
        
        <div class="auth-buttons" id="auth-area">
            <a href="register.html" class="btn-auth btn-register">Register</a>
            <a href="login.html" class="btn-auth btn-login">Login</a>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari barang apa hari ini?">
    </div>

    <div class="items-grid" id="items-grid">
        </div>

    <script>
        // 1. FUNGSI CEK STATUS LOGIN
        function updateAuthUI() {
            const username = localStorage.getItem('username');
            const authArea = document.getElementById('auth-area');

            if (username) {
                // Jika sudah login, ganti tombol Login/Register dengan Nama & Logout
                authArea.innerHTML = `
                    <span id="welcome-text">Halo, ${username}</span>
                    <button onclick="logout()" class="btn-auth btn-logout">Logout</button>
                `;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // 2. FUNGSI LOAD BARANG DARI SERVER
        async function loadItems() {
            try {
                const response = await fetch('/api/all-items'); 
                const items = await response.json();
                
                const itemsGrid = document.getElementById('items-grid');
                itemsGrid.innerHTML = ''; 

                items.forEach(item => {
                    const isAvailable = item.quantity > 0; 
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    itemDiv.innerHTML = `
                        <img src="${item.img}" 
                             alt="${item.name}" 
                             onerror="this.onerror=null; this.src='https://placehold.co/200?text=No+Image'">
                        <div class="item-info">
                            <p class="item-name">${item.name}</p>
                            <p style="font-size: 0.9em; color: #666;">Tersedia: ${item.quantity} unit</p>
                            <span class="badge ${isAvailable ? 'available' : 'unavailable'}">
                                ${isAvailable ? 'Dapat Dipinjam' : 'Stok Habis'}
                            </span>
                        </div>
                    `;
                    
                    itemDiv.onclick = () => {
                        window.location.href = `borrow.html?item=${item.name}`;
                    };
                    itemsGrid.appendChild(itemDiv);
                });
            } catch (error) {
                console.error('Gagal mengambil data:', error);
            }
        }

        // Jalankan saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            loadItems();
        });
    </script>
</body>
</html>
