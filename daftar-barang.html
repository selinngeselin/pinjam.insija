<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Barang - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">Pinjam.in</a>
        </div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="daftar-barang.html" class="active">Daftar Barang</a>
            <a href="peminjaman.html">Peminjaman</a>
        </div>
        
    </nav>

    <div class="wrapper">
        <section class="items-section">
            <div class="section-header">
                <h2>Cari Peralatan SIJA</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Ketik nama barang (misal: Mikrotik)..." onkeyup="searchBarang()">
                </div>
            </div>

            <div class="items-grid" id="itemsGrid">
                <div class="item-card" data-name="Router Mikrotik">
                    <img src="assets/img/Mikrotik.jpg" alt="Mikrotik">
                    <div class="item-info">
                        <h3>Router Mikrotik</h3>
                        <div class="item-footer">
                            <span class="status available">Tersedia</span>
                            <a href="peminjaman.html" class="btn-pinjam">Pinjam</a>
                        </div>
                    </div>
                </div>

                <div class="item-card" data-name="Kabel HDMI">
                    <img src="assets/img/Kabel_HDMI.jpg" alt="Kabel HDMI">
                    <div class="item-info">
                        <h3>Kabel HDMI</h3>
                        <div class="item-footer">
                            <span class="status available">Tersedia</span>
                            <a href="peminjaman.html" class="btn-pinjam">Pinjam</a>
                        </div>
                    </div>
                </div>

                <div class="item-card" data-name="Laptop HP ProBook">
                    <div class="card-image-container">
                        <span class="badge-frequent">🔥 Sering Dipinjam</span>
                        <img src="assets/img/laptop.jpg" alt="Laptop">
                    </div>
                    <div class="item-info">
                        <h3>Laptop HP ProBook</h3>
                        <div class="item-footer">
                            <span class="status available">Tersedia</span>
                            <a href="peminjaman.html" class="btn-pinjam">Pinjam</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function searchBarang() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('item-card');

            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
