version: '3.8'

services:
  web:
    build: .
    container_name: sija-pinjam-web
    restart: always
    ports:
      - "9445:3000"
    environment:
      # Ini yang dibaca oleh process.env.MONGO_URI di server.js kamu
      - MONGO_URI=mongodb://database:27017/sija_pinjam_db
      - Port=3000
    depends_on:
      - database

  database:
    image: mongo:4.4
    container_name: sija-pinjam-db
    restart: always
    ports:
      - "27020:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: