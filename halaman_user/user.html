<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinjam.in SIJA - Profil User</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="user-page">
    <div class="user-container">
        <!-- Sidebar -->
        <div class="user-sidebar">
            <div class="user-logo">
                <div class="user-logo-icon">Σ</div>
                <div class="user-logo-text">
                    <div class="user-brand">Pinjam.in<span>SIJA</span></div>
                    <div class="user-tagline">Solusi Peminjaman Mudah & Cepat</div>
                </div>
            </div>

            <a href="index.html" class="user-menu-item">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
                <span>Dashboard</span>
            </a>

            <div class="user-menu-item" id="riwayatMenu">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/>
                </svg>
                <span>Riwayat</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="user-main-content">
            <div class="user-header">
                <div class="user-profile">
                    <div class="user-avatar">SA</div>
                    <span class="user-name" id="headerUserName">Selina Agustina</span>
                    <span class="user-dropdown-icon">▼</span>
                </div>
            </div>

            <!-- Form Edit Profil -->
            <div class="user-form-card" id="formSection">
                <form id="userProfileForm">
                    <div class="user-form-group">
                        <label for="nama">Nama :</label>
                        <input type="text" id="nama" name="nama" value="Selina Agustina" required>
                    </div>

                    <div class="user-form-group">
                        <label for="nis">NIS:</label>
                        <input type="text" id="nis" name="nis" value="123456781211" required>
                    </div>

                    <div class="user-form-group">
                        <label for="telepon">Nomor Telepon :</label>
                        <input type="tel" id="telepon" name="telepon" value="083120800119" required>
                    </div>

                    <div class="user-form-group">
                        <label for="email">Akun Google :</label>
                        <input type="email" id="email" name="email" value="selinaagustina123@gmail.com" required>
                    </div>

                    <div class="user-form-group">
                        <label for="angkatan">Angkatan, Rombel Kelas :</label>
                        <input type="text" id="angkatan" name="angkatan" value="50, SIJA A" required>
                    </div>

                    <div class="user-button-group">
                        <button type="submit" class="user-btn user-btn-primary">Simpan</button>
                        <button type="button" class="user-btn user-btn-secondary" id="batalBtn">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Informasi Data (Hidden by default) -->
            <div class="user-info-card" id="infoSection" style="display: none;">
                <h2 class="info-title">✓ Informasi Akun Tersimpan</h2>
                
                <div class="info-item">
                    <div class="info-label">Nama:</div>
                    <div class="info-value" id="infoNama">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">NIS:</div>
                    <div class="info-value" id="infoNis">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Nomor Telepon:</div>
                    <div class="info-value" id="infoTelepon">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Akun Google:</div>
                    <div class="info-value" id="infoEmail">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Angkatan, Rombel Kelas:</div>
                    <div class="info-value" id="infoAngkatan">-</div>
                </div>

                <div class="user-button-group">
                    <button type="button" class="user-btn user-btn-primary" id="editBtn">Edit Profil</button>
                    <a href="index.html" class="user-btn user-btn-secondary" style="text-decoration: none; display: inline-block; text-align: center;">Kembali ke Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="user-script.js"></script>
</body>
</html>
