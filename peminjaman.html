<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Peminjaman - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left"><a href="index.html" class="logo">Pinjam.in</a></div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="daftar-barang.html">Daftar Barang</a>
            <a href="peminjaman.html" class="active">Peminjaman</a>
        </div>
        <div class="nav-right">
            <a href="login.html" class="btn-login-nav">Login</a>
            <a href="register.html" class="btn-register-nav">Register</a>
        </div>
    </nav>

    <div class="wrapper">
        <section class="form-section">
            <div class="form-container">
                <h2>Form Pengajuan Peminjaman</h2>
                <p>Silakan isi data di bawah ini dengan lengkap dan benar.</p>

                <form id="loanForm">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama sesuai kartu pelajar" required>
                    </div>

                    <div class="form-group">
                        <label for="kelas">Kelas / Jurusan</label>
                        <input type="text" id="kelas" placeholder="Contoh: XII SIJA 1" required>
                    </div>

                    <div class="form-group">
                        <label for="barang">Barang yang Dipinjam</label>
                        <select id="barang" required>
                            <option value="">-- Pilih Barang --</option>
                            <option value="Laptop">Laptop</option>
                            <option value="Proyektor">Proyektor</option>
                            <option value="Kabel HDMI">Kabel HDMI</option>
                            <option value="Mouse">Mouse</option>
                            <option value="Keyboard">Keyboard</option>
                            <option value="Mikrotik">Mikrotik</option>
                            <option value="Nodemcu">Nodemcu</option>
                            <option value="Arduino">Arduino</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="durasi">Durasi Peminjaman (Hari)</label>
                        <input type="number" id="durasi" min="1" max="3" placeholder="Maksimal 3 hari" required>
                    </div>

                    <div class="form-group">
                        <label for="keperluan">Keperluan Peminjaman</label>
                        <textarea id="keperluan" rows="4" placeholder="Contoh: Untuk Praktik Jaringan Dasar"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Ajukan Peminjaman</button>
                </form>
            </div>
        </section>
    </div>
    <script>
        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const dataPinjam = {
                item: document.getElementById('barang').value, // Pastikan ID ini ada di <select>
                nama: document.getElementById('nama').value,   // Pastikan ID ini ada di <input>
                kelas: document.getElementById('kelas').value,
                jumlah: 1
            };

            fetch('/api/borrow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPinjam)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = 'konfirmasi.html';
                } else {
                    alert("Gagal: " + data.message);
                }
            })
            .catch(err => alert("Server mati! Nyalakan server.js"));
        });
    </script>
</body>
</html>
