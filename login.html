<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Login</h1>
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px;">
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <select id="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="message"></p>
        <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Menghentikan refresh otomatis halaman
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (data.success) {
                    // --- KODE NOMOR 3 (KEAMANAN) DI TARUH DI SINI ---
                    // Kita menyimpan 'data.role' yang dikirim oleh server (database)
                    // bukan sekadar 'role' dari pilihan dropdown form.
                    localStorage.setItem('role', data.role); 
                    localStorage.setItem('username', data.username);
                    
                    // Logika pengalihan halaman
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    // Menampilkan pesan error dari server (contoh: "Login gagal!")
                    document.getElementById('message').textContent = data.message;
                    document.getElementById('message').style.color = "red";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('message').textContent = "Terjadi kesalahan koneksi ke server.";
            }
        });
    </script>
</body>
</html>
