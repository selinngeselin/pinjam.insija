<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="auth-layout">

        <!-- KIRI: Foto/Ilustrasi -->
        <div class="auth-image-side">
            <img src="assets/img/spiderman.jpg" alt="Ilustrasi Login" class="auth-image">
            <div class="auth-image-overlay">
                <h2>Sistem Peminjaman<br>Barang Jurusan SIJA</h2>
                <p>Pinjam alat dengan mudah, cepat, dan tercatat.</p>
            </div>
        </div>

        <!-- KANAN: Form Login -->
        <div class="auth-form-side">
            <div class="auth-form-box">
                <div class="auth-logo">
                    <a href="index.html">
                        <img src="assets/img/logo_kelompok12.png" alt="Logo" class="auth-logo-img">
                        <span>Pinjam<span class="auth-logo-dot">.in</span></span>
                    </a>
                </div>

                <div class="form-header">
                    <h2>Selamat Datang Kembali</h2>
                    <p>Silakan login untuk mengelola peminjaman alat SIJA.</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username / Email</label>
                        <input type="text" id="username" placeholder="Masukkan username atau email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>

                    <button type="submit" class="btn-submit">Masuk Sekarang</button>

                    <div class="form-footer">
                        <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
                        <a href="index.html" class="back-link">← Kembali ke Beranda</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        if (!usernameInput || !passwordInput) {
            console.error("Input tidak ditemukan!");
            return;
        }

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.success) {
                localStorage.setItem('role', result.role);
                localStorage.setItem('username', result.username);

                if (result.role === 'admin') {
                    alert("Selamat datang, Admin!");
                    window.location.href = 'admin.html';
                } else {
                    alert("Login Berhasil!");
                    window.location.href = 'user.html';
                }
            } else {
                alert("Login Gagal: " + result.message);
            }
        } catch (error) {
            alert("Gagal terhubung ke server.");
        }
    });
    </script>
</body>
</html>
