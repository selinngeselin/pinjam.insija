<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pinjam.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="wrapper">
        <section class="form-section">
            <div class="form-container login-card">
                <div class="form-header">
                    <h2>Selamat Datang Kembali</h2>
                    <p>Silakan login untuk mengelola peminjaman alat SIJA.</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username / Email</label>
                        <input type="text" id="username" placeholder="Masukkan username atau email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>

                    <button type="submit" class="btn-submit">Masuk Sekarang</button>
                    
                    <div class="form-footer">
                        <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
                        <a href="index.html" class="back-link">← Kembali ke Beranda</a>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Samakan ID-nya dengan yang ada di HTML tadi
        const usernameInput = document.getElementById('username'); 
        const passwordInput = document.getElementById('password');

        if (!usernameInput || !passwordInput) {
            console.error("Input tidak ditemukan! Periksa kembali ID di HTML.");
            return;
        }

        const email = usernameInput.value; // Nilai ini akan dikirim ke backend
        const password = passwordInput.value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    // SIMPAN ROLE DI BROWSER (Agar sistem tidak lupa)
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('username', result.username);

                    // LOGIKA PENGALIHAN (REDIRECT)
                    if (result.role === 'admin') {
                        alert("Selamat datang, Admin!");
                        window.location.href = 'admin.html'; // Pintu khusus admin
                    } else {
                        alert("Login Berhasil!");
                        window.location.href = 'index.html'; // Pintu user biasa
                    }
                } else {
                    alert("Login Gagal: " + result.message);
                }
            } catch (error) {
                alert("Gagal terhubung ke server.");
            }
        });
    </script>
</body>
</html>
